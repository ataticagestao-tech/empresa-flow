project_id = "onobornmnzemgsduscug"

# Indicadores econômicos + notícias (BCB/IBGE) — dados públicos, sem auth.
[functions.indicadores-economicos]
verify_jwt = false

# Radar Legislativo — proposições da Câmara. Dados públicos; coleta via cron
# (pg_net → service key sb_secret_*), por isso verify_jwt=false.
[functions.radar-legislativo]
verify_jwt = false

# Notícias por setor (Google News RSS por query) — dados públicos, sem auth.
[functions.noticias-setor]
verify_jwt = false

[functions.import-omie-data]
verify_jwt = false

[functions.whatsapp-cloud-webhook]
verify_jwt = false

# Inbox de WhatsApp. Chamado pelo browser (JWT do usuário, validado via auth.getUser)
# E pelo meutatico server-side (X-Inbox-Secret). verify_jwt=false pra não barrar a
# chamada server-side (service key novo sb_secret_* não é JWT); a auth é feita dentro.
[functions.whatsapp-inbox]
verify_jwt = false

# Chamadas server-side com a service key (formato novo sb_secret_*, que nao e
# JWT). Precisam de verify_jwt=false senao o gateway rejeita com
# UNAUTHORIZED_INVALID_JWT_FORMAT. Vale pro agente e pras tools dele.
[functions.agente-orquestrador]
verify_jwt = false

# Chat interno do assistente (dentro do sistema). Recebe o JWT do usuário
# logado no Authorization, mas validamos o token manualmente via auth.getUser
# (verify_jwt=false pra alinhar com o resto da cadeia do agente, que usa a
# service key sb_secret_* nas chamadas internas pras tools).
[functions.agente-chat-web]
verify_jwt = false

[functions.agente-tool-enviar_overnight]
verify_jwt = false

# Cadeia do overnight + cadastro: chamadas servidor-a-servidor com a service
# key sb_secret_* (cron/pg_net, agente, disparar→gerar→enviar). Sem
# verify_jwt=false o gateway barra a chamada interna com 401.
[functions.disparar-overnight-agendado]
verify_jwt = false

[functions.gerar-overnight-pdf]
verify_jwt = false

# Gerador de relatório financeiro em PDF (fluxo/CP/CR/DRE/faturamento).
